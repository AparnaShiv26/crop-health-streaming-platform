services:

  kafka:
    image: apache/kafka:latest
    container_name: crop-health-kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Kafka listeners
      # 9092  -> access from Windows / Python producer
      # 29092 -> access from other Docker containers such as Spark
      # 9093  -> Kafka KRaft controller
      KAFKA_LISTENERS: >
        PLAINTEXT_HOST://0.0.0.0:9092,
        PLAINTEXT_DOCKER://0.0.0.0:29092,
        CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT_HOST://localhost:9092,
        PLAINTEXT_DOCKER://kafka:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        PLAINTEXT_DOCKER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@localhost:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1


  postgres:
    image: postgres:17
    container_name: crop-health-postgres

    environment:
      POSTGRES_DB: crop_health
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  spark:
    image: apache/spark:3.5.5
    container_name: crop-health-spark

    command:
      - sleep
      - infinity

    volumes:
      - ./:/opt/project

    working_dir: /opt/project

    depends_on:
      - kafka


volumes:
  postgres_data: